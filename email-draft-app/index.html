<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <title>טיוטת מייל ב-Outlook - Electron</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      direction: rtl;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    label, input, textarea, button {
      display: block;
      width: 100%;
      margin-bottom: 15px;
      font-size: 16px;
    }
    textarea {
      height: 120px;
    }
    ul#draftList {
      list-style: none;
      padding: 0;
    }
    ul#draftList li {
      background: #f5f5f5;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    ul#draftList button {
      width: auto;
      margin-bottom: 0;
      font-size: 14px;
      margin-left: 5px;
    }
  </style>
</head>
<body>
  <h1>צור טיוטת מייל עם קובץ מצורף ב-Outlook</h1>
  <form id="emailForm">
    <label for="to">נמען (מופרדים בפסיק):</label>
    <input type="text" id="to" required />

    <label for="subject">נושא:</label>
    <input type="text" id="subject" required />

    <label for="body">גוף ההודעה:</label>
    <textarea id="body" required></textarea>

    <label for="fileInput">קובץ מצורף (pdf, doc, docx):</label>
    <input type="file" id="fileInput" accept=".pdf,.doc,.docx" required />

    <button type="submit">הוסף לטיוטות</button>
  </form>

  <h2>טיוטות ממתינות</h2>
  <ul id="draftList"></ul>

  <script>
    const form = document.getElementById('emailForm');
    let pendingDrafts = [];

    function renderDrafts() {
      const list = document.getElementById('draftList');
      list.innerHTML = '';
      pendingDrafts.forEach((draft, idx) => {
        const li = document.createElement('li');
        li.innerHTML = `
          <span>
            <b>${draft.subject}</b> (${draft.to}) - ${draft.fileName}
          </span>
          <span>
            <button onclick="openDraft(${idx})">פתח</button>
            <button onclick="deleteDraft(${idx})">מחק</button>
          </span>
        `;
        list.appendChild(li);
      });
    }

    window.openDraft = function(idx) {
      window.electronAPI.createAndOpenEml(pendingDrafts[idx]);
      pendingDrafts.splice(idx, 1);
      renderDrafts();
    };

    window.deleteDraft = function(idx) {
      pendingDrafts.splice(idx, 1);
      renderDrafts();
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const to = document.getElementById('to').value;
      const subject = document.getElementById('subject').value;
      const body = document.getElementById('body').value;
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];

      if (!file) {
        alert("לא נבחר קובץ");
        return;
      }

      const reader = new FileReader();
      reader.onload = async () => {
        const base64 = reader.result.split(',')[1];
        // Add to pending drafts instead of sending immediately
        pendingDrafts.push({
          to,
          subject,
          body,
          filePath: file.path,
          fileName: file.name,
          fileBase64: base64
        });
        renderDrafts();
        form.reset();
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
