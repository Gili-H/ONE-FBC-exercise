<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <title>טיוטת מייל ב-Outlook - Electron</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      direction: rtl;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    label, input, textarea, button {
      display: block;
      width: 100%;
      margin-bottom: 15px;
      font-size: 16px;
    }
    textarea {
      height: 120px;
    }
  </style>
</head>
<body>
  <h1>צור טיוטת מייל עם קובץ מצורף ב-Outlook</h1>
  <form id="emailForm">
    <label for="to">נמען (מופרדים בפסיק):</label>
    <input type="text" id="to" required />
    
    <label for="subject">נושא:</label>
    <input type="text" id="subject" required />
    
    <label for="body">גוף ההודעה:</label>
    <textarea id="body" required></textarea>
    
    <label for="fileInput">קובץ מצורף (pdf, doc, docx):</label>
    <input type="file" id="fileInput" accept=".pdf,.doc,.docx" required />
    
    <button type="submit">צור ופתח טיוטה</button>
  </form>

  <script>
    const form = document.getElementById('emailForm');

   form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const to = document.getElementById('to').value;
  const subject = document.getElementById('subject').value;
  const body = document.getElementById('body').value;
  const fileInput = document.getElementById('fileInput');
  const file = fileInput.files[0];

  if (!file) {
    alert("לא נבחר קובץ");
    return;
  }

  const reader = new FileReader();

  reader.onload = async () => {
    const base64 = reader.result.split(',')[1];

    await window.electronAPI.createAndOpenEml({
      to,
      subject,
      body,
      filePath: file.path,        // לא חובה, לא נעשה בו שימוש
      fileName: file.name,
      fileBase64: base64
    });
  };

  reader.readAsDataURL(file);
});

  </script>
</body>
</html>
